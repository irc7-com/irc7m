name: Build Irc7m

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # macOS arm64 - self-hosted runner required (needs Xcode 26 / MacCatalyst 26.0 SDK)
  # GitHub-hosted macos-26 runners are not yet available (as of June 2026).
  # Register your Mac: GitHub -> Settings -> Actions -> Runners -> New
  # Label it:  self-hosted, macos, arm64
  # Setup script: bash .github/setup-runner.sh <TOKEN> <REPO_URL>
  build-macos:
    name: macOS (arm64, self-hosted)
    runs-on: [self-hosted, macos, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: macos-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: macos-nuget-

      - name: Install MAUI workload (Mac Catalyst only)
        run: dotnet workload install maui-maccatalyst

      - name: Restore Mac Catalyst TFM only
        run: dotnet restore Irc7m.csproj /p:TargetFrameworks=net10.0-maccatalyst -r maccatalyst-arm64

      - name: Publish Mac Catalyst arm64 self-contained
        run: |
          dotnet publish Irc7m.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            -r maccatalyst-arm64 \
            --self-contained true \
            --no-restore

      - name: Zip .app bundle
        run: |
          APP=$(find bin/Release/net10.0-maccatalyst -name "*.app" -type d | head -1)
          echo "Found .app at: $APP"
          zip -r9 Irc7m-macos-arm64.zip "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Irc7m-macos-arm64
          path: Irc7m-macos-arm64.zip
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -f Irc7m-macos-arm64.zip


  # Windows x64 - GitHub-hosted runner
  # Uses maui-windows workload only (not the full maui workload) to avoid
  # pulling Mono runtime packages for iOS/Android/Mac that are absent from
  # nuget.org for many .NET servicing patch versions.
  # Restore is explicitly scoped to net10.0-windows for the same reason.
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: windows-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: windows-nuget-

      - name: Install MAUI workload (Windows only)
        run: dotnet workload install maui-windows

      - name: Restore Windows TFM only
        run: dotnet restore Irc7m.csproj /p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64

      - name: Publish Windows x64 self-contained
        shell: pwsh
        run: |
          dotnet publish Irc7m.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -o ./artifacts/windows

      - name: Zip Windows output
        shell: pwsh
        run: Compress-Archive -Path artifacts/windows/* -DestinationPath Irc7m-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Irc7m-windows-x64
          path: Irc7m-windows-x64.zip
          retention-days: 30
