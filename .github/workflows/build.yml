name: Build Irc7m

# ─────────────────────────────────────────────────────────────────────────────
# Supported targets
#   macOS aarch64   → net10.0-maccatalyst / maccatalyst-arm64  (Mac Catalyst)
#   Windows x64     → net10.0-windows10.0.19041.0 / win-x64   (WinUI 3)
#
# Linux is NOT supported by .NET MAUI (no Linux UI backend exists).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:

  # ── macOS arm64 ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14         # GitHub's Apple Silicon (M1/M2) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install MAUI workload
        run: sudo dotnet workload install maui

      - name: Publish — Mac Catalyst arm64 (self-contained)
        run: |
          dotnet publish Irc7m.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            -r maccatalyst-arm64 \
            --self-contained true \
            -o ./artifacts/macos

      - name: Zip .app bundle
        run: |
          cd artifacts/macos
          zip -r9 ../../Irc7m-macos-arm64.zip Irc7m.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Irc7m-macos-arm64
          path: Irc7m-macos-arm64.zip
          retention-days: 30


  # ── Windows x64 ──────────────────────���──────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish — Windows x64 (self-contained)
        run: |
          dotnet publish Irc7m.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./artifacts/windows

      - name: Zip Windows output
        run: Compress-Archive -Path artifacts/windows/* -DestinationPath Irc7m-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Irc7m-windows-x64
          path: Irc7m-windows-x64.zip
          retention-days: 30

